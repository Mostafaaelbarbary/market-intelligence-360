version: 2

models:
  - name: dim_customers
    description: "Customer dimension table built from internal customer data."
    columns:
      - name: customer_id
        description: "Primary key for each customer."
        tests:
          - not_null
          - unique
      - name: email
        description: "Customer email address."

  - name: dim_products
    description: "Product dimension table built from internal product data."
    columns:
      - name: product_id
        description: "Primary key for each product."
        tests:
          - not_null
          - unique
      - name: product_name
        description: "Name of the product."

  - name: fact_orders
    description: "Fact table containing customer orders and derived revenue."
    columns:
      - name: order_id
        description: "Primary key for each order."
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Foreign key to dim_customers."
      - name: product_id
        description: "Foreign key to dim_products."
      - name: revenue
        description: "Calculated revenue for the order."

  - name: customer_360
    description: "Gold layer table showing unified customer behavior and revenue metrics."
    columns:
      - name: customer_id
        description: "Primary key for each customer."
        tests:
          - not_null
          - unique
      - name: total_orders
        description: "Total number of orders placed by the customer."
      - name: total_revenue
        description: "Total revenue generated by the customer."
      - name: avg_order_value
        description: "Average revenue per order for the customer."